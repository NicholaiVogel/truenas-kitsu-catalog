apiVersion: v1
kind: Service
metadata:
  name: {{ include "kitsu.component" (dict "root" . "component" "redis") }}
  labels:
    {{- include "kitsu.labels" . | nindent 4 }}
    app.kubernetes.io/component: redis
spec:
  ports:
    - name: redis
      port: {{ .Values.redis.port }}
      targetPort: redis
  selector:
    {{- include "kitsu.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: redis
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "kitsu.component" (dict "root" . "component" "redis") }}
  labels:
    {{- include "kitsu.labels" . | nindent 4 }}
    app.kubernetes.io/component: redis
spec:
  serviceName: {{ include "kitsu.component" (dict "root" . "component" "redis") }}
  replicas: 1
  selector:
    matchLabels:
      {{- include "kitsu.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: redis
  template:
    metadata:
      labels:
        {{- include "kitsu.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: redis
    spec:
      containers:
        - name: redis
          image: {{ include "kitsu.image" .Values.images.redis | quote }}
          imagePullPolicy: {{ .Values.images.redis.pullPolicy }}
          args: ["--appendonly", "yes"]
          ports:
            - name: redis
              containerPort: 6379
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            {{- toYaml .Values.resources.redis | nindent 12 }}
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            periodSeconds: 10
      volumes:
        - name: data
          {{- if and .Values.persistence.enabled (eq .Values.persistence.type "hostPath") }}
          hostPath:
            path: {{ required "persistence.redis.hostPath is required when persistence.type=hostPath" .Values.persistence.redis.hostPath | quote }}
            type: Directory
          {{- else if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "kitsu.component" (dict "root" . "component" "redis") }}
          {{- else }}
          emptyDir: {}
          {{- end }}
