{{- $secretKey := include "kitsu.secretValue" (dict "root" . "key" "SECRET_KEY" "value" .Values.zou.secretKey "length" 64) -}}
{{- $dbPassword := include "kitsu.secretValue" (dict "root" . "key" "DB_PASSWORD" "value" .Values.postgresql.password "length" 48) -}}
{{- $indexerKey := include "kitsu.secretValue" (dict "root" . "key" "INDEXER_KEY" "value" .Values.meilisearch.masterKey "length" 48) -}}
{{- $adminPassword := include "kitsu.secretValue" (dict "root" . "key" "ZOU_ADMIN_PASSWORD" "value" .Values.zou.admin.password "length" 24) -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "kitsu.fullname" . }}
  labels:
    {{- include "kitsu.labels" . | nindent 4 }}
type: Opaque
stringData:
  SECRET_KEY: {{ $secretKey | quote }}
  DB_PASSWORD: {{ $dbPassword | quote }}
  POSTGRES_PASSWORD: {{ $dbPassword | quote }}
  INDEXER_KEY: {{ $indexerKey | quote }}
  MEILI_MASTER_KEY: {{ $indexerKey | quote }}
  ZOU_ADMIN_PASSWORD: {{ $adminPassword | quote }}
  MAIL_PASSWORD: {{ .Values.zou.mail.password | quote }}
