{{- if .Values.image.registryAuth.enabled }}
{{- $username := required "image.registryAuth.username is required when registry auth is enabled" .Values.image.registryAuth.username -}}
{{- $password := required "image.registryAuth.password is required when registry auth is enabled" .Values.image.registryAuth.password -}}
{{- $server := required "image.registryAuth.server is required when registry auth is enabled" .Values.image.registryAuth.server -}}
{{- $auth := printf "%s:%s" $username $password | b64enc -}}
{{- $entry := dict "username" $username "password" $password "auth" $auth -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "biohazardfs.registryAuthSecretName" . | quote }}
  labels:
    app.kubernetes.io/name: {{ include "biohazardfs.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: registry-auth
type: kubernetes.io/dockerconfigjson
data:
  .dockerconfigjson: {{ dict "auths" (dict $server $entry) | toJson | b64enc | quote }}
{{- end }}
