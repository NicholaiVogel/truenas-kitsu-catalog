image:
  rustfs:
    repository: rustfs/rustfs
    tag: 1.0.0-beta.8
    pullPolicy: IfNotPresent
  postgres:
    repository: postgres
    tag: 16-alpine
    pullPolicy: IfNotPresent
  juicefs:
    repository: juicedata/mount
    tag: ce-v1.3.1
    pullPolicy: IfNotPresent
  awscli:
    repository: amazon/aws-cli
    tag: 2.35.14
    pullPolicy: IfNotPresent

network:
  nodeIP: 192.168.1.128
  rustfsS3NodePort: 30900
  rustfsConsoleNodePort: 30901
  postgresNodePort: 30432
  exposeTailnet: false
  tailnetIP: 100.97.98.116

persistence:
  rustfsHostPath: /mnt/Pool2/Applications/JuiceFS/rustfs
  postgresHostPath: /mnt/Pool2/Applications/JuiceFS/postgres

rustfs:
  accessKey: rustfsadmin
  secretKey: ""
  bucket: juicefs-chunks

postgres:
  user: juicefs
  password: ""
  database: juicefs_meta

juicefs:
  volumeName: biohazard
  clientBucketUrl: ""
  formatOnce:
    enabled: false
    jobName: biohazard-storage-juicefs-format-once
