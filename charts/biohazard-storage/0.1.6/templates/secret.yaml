{{- $secretName := printf "%s-secrets" .Release.Name -}}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $secretName -}}
{{- $rustfsAccessKey := .Values.rustfs.accessKey | default "biohazardjuicefs" -}}
{{- $rustfsSecretKey := .Values.rustfs.secretKey | default "" -}}
{{- if and $existing (index $existing.data "RUSTFS_ACCESS_KEY") -}}
{{- $existingRustfsAccessKey := (index $existing.data "RUSTFS_ACCESS_KEY" | b64dec) -}}
{{- if and .Values.rustfs.accessKey (ne .Values.rustfs.accessKey $existingRustfsAccessKey) -}}
{{- fail "rustfs.accessKey is immutable after first install; use an explicit credential rotation procedure instead of changing chart values" -}}
{{- end -}}
{{- $rustfsAccessKey = $existingRustfsAccessKey -}}
{{- end -}}
{{- if and $existing (index $existing.data "RUSTFS_SECRET_KEY") -}}
{{- $existingRustfsSecretKey := (index $existing.data "RUSTFS_SECRET_KEY" | b64dec) -}}
{{- if and .Values.rustfs.secretKey (ne .Values.rustfs.secretKey $existingRustfsSecretKey) -}}
{{- fail "rustfs.secretKey is immutable after first install; use an explicit credential rotation procedure instead of changing chart values" -}}
{{- end -}}
{{- $rustfsSecretKey = $existingRustfsSecretKey -}}
{{- else if eq $rustfsSecretKey "" -}}
{{- $rustfsSecretKey = randAlphaNum 44 -}}
{{- end -}}
{{- if eq $rustfsSecretKey "changeme-rustfs-secret" -}}
{{- fail "rustfs.secretKey is set to the old public placeholder; rotate to a strong secret before installing/upgrading" -}}
{{- end -}}
{{- $postgresUser := .Values.postgres.user | default "juicefs" -}}
{{- if and $existing (index $existing.data "POSTGRES_USER") -}}
{{- $existingPostgresUser := (index $existing.data "POSTGRES_USER" | b64dec) -}}
{{- if and .Values.postgres.user (ne .Values.postgres.user $existingPostgresUser) -}}
{{- fail "postgres.user is immutable after first install; use an explicit migration procedure instead of changing chart values" -}}
{{- end -}}
{{- $postgresUser = $existingPostgresUser -}}
{{- end -}}
{{- $postgresDb := .Values.postgres.database | default "juicefs_meta" -}}
{{- if and $existing (index $existing.data "POSTGRES_DB") -}}
{{- $existingPostgresDb := (index $existing.data "POSTGRES_DB" | b64dec) -}}
{{- if and .Values.postgres.database (ne .Values.postgres.database $existingPostgresDb) -}}
{{- fail "postgres.database is immutable after first install; use an explicit migration procedure instead of changing chart values" -}}
{{- end -}}
{{- $postgresDb = $existingPostgresDb -}}
{{- end -}}
{{- $postgresPassword := .Values.postgres.password | default "" -}}
{{- if and $existing (index $existing.data "POSTGRES_PASSWORD") -}}
{{- $existingPostgresPassword := (index $existing.data "POSTGRES_PASSWORD" | b64dec) -}}
{{- if and .Values.postgres.password (ne .Values.postgres.password $existingPostgresPassword) -}}
{{- fail "postgres.password is immutable after first install; use an explicit credential rotation procedure instead of changing chart values" -}}
{{- end -}}
{{- $postgresPassword = $existingPostgresPassword -}}
{{- else if eq $postgresPassword "" -}}
{{- $postgresPassword = randAlphaNum 44 -}}
{{- end -}}
{{- if eq $postgresPassword "changeme-postgres-secret" -}}
{{- fail "postgres.password is set to the old public placeholder; rotate to a strong secret before installing/upgrading" -}}
{{- end -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
type: Opaque
stringData:
  RUSTFS_ACCESS_KEY: {{ $rustfsAccessKey | quote }}
  RUSTFS_SECRET_KEY: {{ $rustfsSecretKey | quote }}
  POSTGRES_USER: {{ $postgresUser | quote }}
  POSTGRES_PASSWORD: {{ $postgresPassword | quote }}
  POSTGRES_DB: {{ $postgresDb | quote }}
  META_PASSWORD: {{ $postgresPassword | quote }}
  AWS_ACCESS_KEY_ID: {{ $rustfsAccessKey | quote }}
  AWS_SECRET_ACCESS_KEY: {{ $rustfsSecretKey | quote }}
