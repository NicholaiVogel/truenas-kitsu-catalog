{{- if not .Values.secrets.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "biohazardfs.secretName" . | quote }}
  labels:
    app.kubernetes.io/name: {{ include "biohazardfs.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: secret
type: Opaque
stringData:
  {{ .Values.secrets.databaseUrlKey | quote }}: {{ required "secrets.databaseUrl is required when secrets.existingSecret is empty" .Values.secrets.databaseUrl | quote }}
  {{ .Values.secrets.objectStoreEndpointKey | quote }}: {{ required "secrets.objectStoreEndpoint is required when secrets.existingSecret is empty" .Values.secrets.objectStoreEndpoint | quote }}
  {{ .Values.secrets.objectStoreBucketKey | quote }}: {{ required "secrets.objectStoreBucket is required when secrets.existingSecret is empty" .Values.secrets.objectStoreBucket | quote }}
  {{ .Values.secrets.objectStoreAccessKeyIdKey | quote }}: {{ required "secrets.objectStoreAccessKeyId is required when secrets.existingSecret is empty" .Values.secrets.objectStoreAccessKeyId | quote }}
  {{ .Values.secrets.objectStoreSecretAccessKeyKey | quote }}: {{ required "secrets.objectStoreSecretAccessKey is required when secrets.existingSecret is empty" .Values.secrets.objectStoreSecretAccessKey | quote }}
{{- end }}
