{{- if and .Values.nextcloud.enabled .Values.tailnet.externalIPs }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nextcloud-tailnet-proxy
  labels:
    app.kubernetes.io/name: tailnet-bridges
    app.kubernetes.io/instance: {{ .Release.Name | quote }}
    app.kubernetes.io/component: nextcloud-tailnet-proxy
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: tailnet-bridges
      app.kubernetes.io/instance: {{ .Release.Name | quote }}
      app.kubernetes.io/component: nextcloud-tailnet-proxy
  template:
    metadata:
      labels:
        app.kubernetes.io/name: tailnet-bridges
        app.kubernetes.io/instance: {{ .Release.Name | quote }}
        app.kubernetes.io/component: nextcloud-tailnet-proxy
    spec:
      containers:
        - name: socat
          image: {{ printf "%s:%s" .Values.image.repository .Values.image.tag | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy | quote }}
          args:
            - -d
            - -d
            - {{ printf "TCP-LISTEN:%d,fork,reuseaddr" 8080 | quote }}
            - {{ printf "TCP:%s:%d" .Values.nextcloud.targetHost (int .Values.nextcloud.targetPort) | quote }}
          ports:
            - name: proxy
              containerPort: 8080
              protocol: TCP
          readinessProbe:
            tcpSocket:
              port: proxy
            initialDelaySeconds: 2
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: proxy
            initialDelaySeconds: 10
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: nextcloud-tailnet-proxy
  labels:
    app.kubernetes.io/name: tailnet-bridges
    app.kubernetes.io/instance: {{ .Release.Name | quote }}
    app.kubernetes.io/component: nextcloud-tailnet-proxy
spec:
  type: ClusterIP
  externalIPs:
{{- range .Values.tailnet.externalIPs }}
    - {{ . | quote }}
{{- end }}
  ports:
    - name: http
      port: {{ .Values.nextcloud.listenPort }}
      targetPort: proxy
      protocol: TCP
  selector:
    app.kubernetes.io/name: tailnet-bridges
    app.kubernetes.io/instance: {{ .Release.Name | quote }}
    app.kubernetes.io/component: nextcloud-tailnet-proxy
{{- end }}
