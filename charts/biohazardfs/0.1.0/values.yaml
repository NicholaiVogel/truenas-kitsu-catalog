image:
  repository: ghcr.io/biohazard-vfx/biohazardfs-server
  tag: "0.1.0-dev"
  pullPolicy: IfNotPresent

api:
  replicas: 1

worker:
  enabled: false
  replicas: 1

service:
  type: ClusterIP
  port: 8080
  nodePort: null

ingress:
  enabled: false
  className: ""
  hosts: []
  tls: []

config:
  publicUrl: "http://biohazardfs.local"
  log: "info"
  objectStoreProvider: "rustfs"
  objectStoreRegion: "us-east-1"

secrets:
  existingSecret: ""
  version: ""
  databaseUrl: ""
  objectStoreEndpoint: "http://biohazard-storage-rustfs:9000"
  objectStoreBucket: "biohazardfs-content"
  objectStoreAccessKeyId: ""
  objectStoreSecretAccessKey: ""
  databaseUrlKey: "database-url"
  objectStoreEndpointKey: "object-store-endpoint"
  objectStoreBucketKey: "object-store-bucket"
  objectStoreAccessKeyIdKey: "object-store-access-key-id"
  objectStoreSecretAccessKeyKey: "object-store-secret-access-key"

resources: {}
