apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ .Release.Name }}-postgres
  labels: { app.kubernetes.io/name: biohazard-storage, app.kubernetes.io/instance: {{ .Release.Name | quote }}, app.kubernetes.io/component: postgres }
spec:
  serviceName: {{ .Release.Name }}-postgres
  replicas: 1
  selector:
    matchLabels: { app.kubernetes.io/instance: {{ .Release.Name | quote }}, app.kubernetes.io/component: postgres }
  template:
    metadata:
      labels: { app.kubernetes.io/name: biohazard-storage, app.kubernetes.io/instance: {{ .Release.Name | quote }}, app.kubernetes.io/component: postgres }
    spec:
      initContainers:
        - name: permissions
          image: busybox:1.36
          command: ["sh", "-c", "mkdir -p /var/lib/postgresql/data && chown -R 999:999 /var/lib/postgresql/data"]
          volumeMounts: [{ name: data, mountPath: /var/lib/postgresql/data }]
      containers:
        - name: postgres
          image: {{ printf "%s:%s" .Values.image.postgres.repository .Values.image.postgres.tag | quote }}
          imagePullPolicy: {{ .Values.image.postgres.pullPolicy | quote }}
          envFrom: [{ secretRef: { name: {{ .Release.Name }}-secrets } }]
          env: [{ name: PGDATA, value: /var/lib/postgresql/data/pgdata }]
          ports: [{ name: postgres, containerPort: 5432, protocol: TCP }]
          volumeMounts: [{ name: data, mountPath: /var/lib/postgresql/data }]
      volumes:
        - name: data
          hostPath: { path: {{ .Values.persistence.postgresHostPath | quote }}, type: Directory }
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-postgres
  labels: { app.kubernetes.io/name: biohazard-storage, app.kubernetes.io/instance: {{ .Release.Name | quote }}, app.kubernetes.io/component: postgres }
spec:
  type: NodePort
  {{- if and .Values.network.exposeTailnet .Values.network.tailnetIP }}
  externalIPs: [{{ .Values.network.tailnetIP | quote }}]
  {{- end }}
  selector: { app.kubernetes.io/instance: {{ .Release.Name | quote }}, app.kubernetes.io/component: postgres }
  ports:
    - { name: postgres, port: 5432, targetPort: postgres, nodePort: {{ .Values.network.postgresNodePort }}, protocol: TCP }
